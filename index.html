<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particles</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <section id="start-screen">
        <article>
            <h3>Welcome to the <span class="heavy">matter game</span></h3>
            <p>You arrived on Mars but you need water to survive.</p>
            <p>Start <span class="bold">combining elementary particle</span> to create <span class="bold">water</span> and thrive on this planet!</p>
            <button id="start-button">Start</button>
        </article>
    </section>
    <section id="game-screen">
        <div id="status"></div>
        <canvas tabindex='1' id="game"></canvas>
        <div id="app"></div>
    </section>
    <div id="stuff"></div>

    <script src="./src/Particle.js"></script>
    <script src="./src/Electron.js"></script>
    <script src="./src/Proton.js"></script>
    <script src="./src/Player.js"></script>
    <script src="./src/Game.js"></script>
    <script src="./src/script.js"></script>
</body>

</html>
